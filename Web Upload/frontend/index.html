<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
        <title>Spring Boot File Upload / Download Rest API Example</title>
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/loading.css" />
        <link rel="stylesheet" href="css/result-model.css" />
    </head>
    <body>
        <div class="app-header">
            <h2>File Processing Application</h2>
        </div>

        <!-- Loading Mask -->
        <div id="loadingMask" class="loading-mask">
            <div class="loading-box">
                <div class="spinner"></div>
                <div class="loading-text">Uploading... Please wait a second</div>
                <div id="uploadProgressText" class="progress-text">0%</div>
            </div>
        </div>

        <div class="page-wrapper">
            <div class="upload-container">
                <div class="upload-content">
                    <div class="single-upload">
                        <h3>Upload Single File (or Image)</h3>
                        <form id="singleUploadForm" name="singleUploadForm">
                            <input id="singleFileUploadInput" type="file" name="file" class="file-input" required />
                            <button type="submit" class="primary submit-btn">Upload</button>
                        </form>
                    </div>
                    <div class="chunk-upload">
                        <h3>Upload Big File by Chunk</h3>
                        <form id="chunkUploadForm" name="chunkUploadForm">
                            <input id="chunkFileUploadInput" type="file" name="file" class="file-input" required />
                            <button type="submit" class="primary submit-btn">Upload</button>
                        </form>
                    </div>
                    <br>
                    <div class="multiple-upload">
                        <h3>Upload Multiple Files</h3>
                        <form id="multipleUploadForm" name="multipleUploadForm">
                            <input id="multipleFileUploadInput" type="file" name="files" class="file-input" multiple required />
                            <button type="submit" class="primary submit-btn">Upload</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="download-container">
                <div class="download-header">
                    <h3>Download File List</h3>
                    <button onclick="loadFiles()" class="refresh-btn">Refresh</button>
                </div>
                <ul id="fileList"></ul>
            </div>
        </div>

        <!-- Result Response Model -->
        <div id="resultModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modalTitle">Result</span>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button onclick="closeModal()">OK</button>
                </div>
            </div>
        </div>
    </body>

    <footer class="app-footer">
        <p>2026 File Processing Application. All Rights Reserved.</p>
    </footer>

    <script src="js/download.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/result-model.js"></script>

    <script src="js/upload-file.js"></script>
    <script src="js/upload-multifile.js"></script>

    <script src="js/uploadChunk.js"></script>
    <script src="js/uploadResume.js"></script>
</html>
